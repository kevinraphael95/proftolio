<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>kevinraphael95 — portfolio</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

  <header>
    <div>
      <h1>kevinraphael95</h1>
      <p class="subtitle">Discord bots • Jeux • TCG • Projets web</p>
    </div>

    <div class="actions">
      <input id="search" placeholder="Rechercher un projet..." />
      <button id="theme">🌙</button>
    </div>
  </header>

  <div class="filters">
    <button class="filter active" data-filter="all">Tout</button>
    <button class="filter" data-filter="jeu">Jeux</button>
    <button class="filter" data-filter="bot">Bots</button>
    <button class="filter" data-filter="tcg">TCG</button>
  </div>

  <div id="grid" class="grid"></div>

  <div id="empty" class="empty hidden">
    Aucun projet trouvé 😕
  </div>

  <footer>
    <span id="count">0</span> projets
  </footer>

</div>

<script src="data.js"></script>
<script src="main.js"></script>
</body>
</html>
